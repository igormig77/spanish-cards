<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Картки Español</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f4f4f4;
padding:20px;
max-width:500px;
margin:auto;
color:#1f2937;
}

h2{
margin-bottom:16px;
}

.card{
background:white;
border-radius:20px;
padding:40px 20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.word{
font-size:40px;
font-weight:700;
margin-bottom:20px;
word-break:break-word;
}

.translation{
font-size:28px;
color:#555;
display:none;
margin-bottom:20px;
word-break:break-word;
}

button{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.show{background:#58cc02;color:white;}
.know{background:#d7ffb8;}
.again{background:#ffdcdc;}
.mode{background:#eee;}
.speak{background:#1cb0f6;color:white;}
</style>
</head>

<body>

<h2>Картки Español</h2>

<button class="mode" id="modeBtn" type="button">🇪🇸 → 🇺🇦</button>

<div class="card">
  <div class="word" id="word"></div>
  <div class="translation" id="translation"></div>

  <button class="show" id="showBtn" type="button">Показати переклад</button>
  <button class="speak" id="speakBtn" type="button">🔊 Озвучити</button>
  <button class="know" id="knowBtn" type="button">Знаю</button>
  <button class="again" id="againBtn" type="button">Не знаю</button>
</div>

<script>
let direction = "es-ua";

const cards = [
["hablar","говорити"],
["comer","їсти"],
["vivir","жити"],
["ser","бути"],
["tener","мати"],
["hacer","робити"],
["ir","йти"],
["ver","бачити"],
["dar","давати"],
["saber","знати"],
["querer","хотіти"],
["poder","могти"],
["poner","класти"],
["venir","приходити"],
["pensar","думати"],
["salir","виходити"],
["volver","повертатися"],
["tomar","брати"],
["sentir","відчувати"],
["decir","говорити"]
];

let index = 0;

const word = document.getElementById("word");
const translation = document.getElementById("translation");
const modeBtn = document.getElementById("modeBtn");

function render(){
  if(direction === "es-ua"){
    word.textContent = cards[index][0];
    translation.textContent = cards[index][1];
  }else{
    word.textContent = cards[index][1];
    translation.textContent = cards[index][0];
  }

  translation.style.display = "none";
}

function next(){
  index++;
  if(index >= cards.length) index = 0;
  render();
}

render();

document.getElementById("showBtn").onclick = () => {
  translation.style.display = "block";
};

document.getElementById("knowBtn").onclick = () => {
  next();
};

document.getElementById("againBtn").onclick = () => {
  next();
};

modeBtn.onclick = () => {
  if(direction === "es-ua"){
    direction = "ua-es";
    modeBtn.textContent = "🇺🇦 → 🇪🇸";
  }else{
    direction = "es-ua";
    modeBtn.textContent = "🇪🇸 → 🇺🇦";
  }
  render();
};

document.getElementById("speakBtn").onclick = () => {
  const text = cards[index][0];
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-ES";
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
};
</script>

</body>
</html>
