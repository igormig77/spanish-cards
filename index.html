<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Картки Español</title>
<style>
:root {
  --bg:#f3f5f7; --card:#ffffff; --text:#152238; --muted:#718096;
  --green:#7acb36; --blue:#57a8e6; --lightgreen:#dff2bf; --lightred:#f3d9d9;
  --red:#ec6b6b; --border:#e7ebef; --shadow:0 10px 28px rgba(30,41,59,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body {
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg); color:var(--text); padding:20px 16px 32px;
}
.app { max-width:560px; margin:0 auto; }
h1 { font-size:30px; margin:8px 0 18px; }
.panel, .card {
  background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:var(--shadow);
}
.panel { padding:14px; margin-bottom:14px; }
.toprow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:12px; }
.stat {
  background:#f8fafc; border:1px solid var(--border); border-radius:16px; padding:10px 8px; text-align:center;
}
.stat .num { font-size:22px; font-weight:800; }
.stat .lab { font-size:12px; color:var(--muted); margin-top:4px; }
.progresswrap { margin-top:12px; }
.progresslabels { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:8px; }
.progress { height:12px; background:#ecf0f4; border-radius:999px; overflow:hidden; }
.progressbar { height:100%; width:0%; background:linear-gradient(90deg,#7acb36,#5ab42b); transition:width .25s ease; }
.card { padding:18px; }
.modebar {
  background:#f3f5f7; border-radius:18px; padding:12px; text-align:center; font-size:28px; margin-bottom:16px; border:1px solid var(--border);
}
.word { font-size:64px; font-weight:900; text-align:center; margin:26px 0; word-break:break-word; }
.translation {
  display:none; background:#f8fafc; border:1px solid var(--border); border-radius:18px; padding:16px; margin-bottom:14px; text-align:center;
}
.translation .label { font-size:13px; color:var(--muted); margin-bottom:6px; }
.translation .value { font-size:30px; font-weight:800; }
.translation .sub { font-size:14px; color:var(--muted); margin-top:6px; }
button {
  width:100%; min-height:58px; border:none; border-radius:18px; font-size:18px; font-weight:800; cursor:pointer; margin-top:10px;
}
button:active { transform:scale(.99); }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-show { background:var(--green); color:white; }
.btn-speak { background:var(--blue); color:white; }
.btn-know { background:#cde9ab; color:#2b4c0c; }
.btn-again { background:#eed4d4; color:#744; }
.btn-ghost { background:#f3f5f7; color:var(--text); border:1px solid var(--border); }
.small { color:var(--muted); font-size:13px; text-align:center; margin-top:10px; }
@media (max-width:520px) {
  .stats{ grid-template-columns:1fr 1fr; }
  .row2, .toprow { grid-template-columns:1fr; }
  .word{ font-size:52px; }
}
</style>
</head>
<body>
<div class="app">
  <h1>Картки Español</h1>

  <div class="panel">
    <div class="toprow">
      <button class="btn-ghost" id="modeBtn" type="button">🇪🇸 → 🇺🇦</button>
      <button class="btn-ghost" id="shuffleBtn" type="button">🔀 Перемішування: увімк.</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="todayCount">0</div><div class="lab">Сьогодні</div></div>
      <div class="stat"><div class="num" id="knownCount">0</div><div class="lab">Знаю</div></div>
      <div class="stat"><div class="num" id="reviewCount">0</div><div class="lab">Повторити</div></div>
      <div class="stat"><div class="num" id="totalCount">0</div><div class="lab">Усього</div></div>
    </div>

    <div class="progresswrap">
      <div class="progresslabels">
        <span id="statusText">Нова картка</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress"><div class="progressbar" id="progressBar"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="modebar" id="modeBar">🇪🇸 → 🇺🇦</div>

    <div class="word" id="word">hablar</div>

    <div class="translation" id="translationBox">
      <div class="label">Переклад</div>
      <div class="value" id="translation">говорити</div>
      <div class="sub">Озвучення завжди читає іспанське слово</div>
    </div>

    <button class="btn-show" id="showBtn" type="button">Показати переклад</button>
    <button class="btn-speak" id="speakBtn" type="button">🔊 Озвучити</button>

    <div class="row2">
      <button class="btn-know" id="knowBtn" type="button">Знаю</button>
      <button class="btn-again" id="againBtn" type="button">Не знаю</button>
    </div>

    <div class="row2">
      <button class="btn-ghost" id="resetBtn" type="button">Скинути прогрес</button>
      <button class="btn-ghost" id="restartTodayBtn" type="button">Новий раунд</button>
    </div>

    <div class="small">У додатку вже 250 дієслів. Порядок можна перемішувати, а повторення працюють автоматично.</div>
  </div>
</div>

const STORAGE_KEY = "spanish-cards-ua-v4-final250";

function todayStr() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function defaultState() {
  const now = Date.now();
  return {
    direction: "es-ua",
    shuffle: true,
    currentId: null,
    revealed: false,
    today: todayStr(),
    stats: { seenToday: 0, knownToday: 0 },
    cards: CARDS.map((card, idx) => ({
      id: idx,
      es: card.es,
      ua: card.ua,
      level: 0,
      due: now,
      seen: 0,
      known: 0
    }))
  };
}

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw || !Array.isArray(raw.cards)) return defaultState();
    if (raw.today !== todayStr()) {
      raw.today = todayStr();
      raw.stats = { seenToday: 0, knownToday: 0 };
    }
    raw.direction = raw.direction || "es-ua";
    raw.shuffle = raw.shuffle !== false;
    raw.revealed = !!raw.revealed;
    raw.currentId = typeof raw.currentId === "number" ? raw.currentId : null;
    return raw;
  } catch(e) {
    return defaultState();
  }
}

let state = loadState();

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

const wordEl = document.getElementById("word");
const translationEl = document.getElementById("translation");
const translationBox = document.getElementById("translationBox");
const modeBtn = document.getElementById("modeBtn");
const modeBar = document.getElementById("modeBar");

const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const statusText = document.getElementById("statusText");

function dueCards() {
  const now = Date.now();
  return state.cards.filter(c => c.due <= now);
}

function currentCard() {
  const due = dueCards();
  if (!due.length) {
    state.cards.forEach(c => c.due = 0);
    state.currentId = null;
    saveState();
    return currentCard();
  }
  let queue = state.shuffle ? shuffleArray(due) : due.slice().sort((a,b) => a.due - b.due || a.id - b.id);
  const current = queue.find(c => c.id === state.currentId);
  if (current) return current;
  state.currentId = queue[0].id;
  saveState();
  return queue[0];
}

function cardStatusLabel(card) {
  if (card.level === 0) return "Нова картка";
  if (card.level === 1) return "Швидкий повтор";
  if (card.level <= 3) return "Закріплення";
  return "Добре запам’яталось";
}

  const total = state.cards.length;
  const mastered = state.cards.filter(c => c.level >= 5).length;
  const due = dueCards().length;
  todayCount.textContent = state.stats.seenToday;
  knownCount.textContent = state.stats.knownToday;
  reviewCount.textContent = due;
  totalCount.textContent = total;
  const percent = Math.round((mastered / total) * 100);
  progressBar.style.width = percent + "%";
  progressText.textContent = percent + "%";
}

function render() {
  const card = currentCard();
  updateStats();
  if (state.direction === "es-ua") {
    modeBtn.textContent = "🇪🇸 → 🇺🇦";
    modeBar.textContent = "🇪🇸 → 🇺🇦";
    wordEl.textContent = card.es;
    translationEl.textContent = card.ua;
  } else {
    modeBtn.textContent = "🇺🇦 → 🇪🇸";
    modeBar.textContent = "🇺🇦 → 🇪🇸";
    wordEl.textContent = card.ua;
    translationEl.textContent = card.es;
  }
  translationBox.style.display = state.revealed ? "block" : "none";
  shuffleBtn.textContent = "🔀 Перемішування: " + (state.shuffle ? "увімк." : "вимк.");
  statusText.textContent = cardStatusLabel(card);
}

function reveal() {
  state.revealed = true;
  saveState();
  render();
}

function scheduleNext(card, knewIt) {
  const now = Date.now();
  if (knewIt) {
    card.level += 1;
    card.known += 1;
    if (card.level === 1) card.due = now + 20 * 60 * 1000;
    else if (card.level === 2) card.due = now + 6 * 60 * 60 * 1000;
    else if (card.level === 3) card.due = now + 1 * 24 * 60 * 60 * 1000;
    else if (card.level === 4) card.due = now + 3 * 24 * 60 * 60 * 1000;
    else if (card.level === 5) card.due = now + 7 * 24 * 60 * 60 * 1000;
    else card.due = now + 14 * 24 * 60 * 60 * 1000;
  } else {
    card.level = Math.max(0, card.level - 1);
    card.due = now + 2 * 60 * 1000;
  }
}

function answer(knewIt) {
  const card = currentCard();
  card.seen += 1;
  state.stats.seenToday += 1;
  if (knewIt) state.stats.knownToday += 1;
  scheduleNext(card, knewIt);
  state.currentId = null;
  state.revealed = false;
  saveState();
  render();
}

function speakSpanish() {
  const card = currentCard();
  const utter = new SpeechSynthesisUtterance(card.es);
  utter.lang = "es-ES";
  utter.rate = 0.92;
  try { speechSynthesis.cancel(); } catch(e) {}
  speechSynthesis.speak(utter);
}

document.getElementById("showBtn").addEventListener("click", reveal);
document.getElementById("speakBtn").addEventListener("click", speakSpanish);
document.getElementById("knowBtn").addEventListener("click", () => answer(true));
document.getElementById("againBtn").addEventListener("click", () => {
  if (!state.revealed) {
    state.revealed = true;
    saveState();
    render();
    setTimeout(() => answer(false), 5000);
  } else {
    answer(false);
  }
});
modeBtn.addEventListener("click", () => {
  state.direction = state.direction === "es-ua" ? "ua-es" : "es-ua";
  state.revealed = false;
  saveState();
  render();
});
shuffleBtn.addEventListener("click", () => {
  state.shuffle = !state.shuffle;
  saveState();
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Скинути весь прогрес?")) return;
  state = defaultState();
  saveState();
  render();
});
document.getElementById("restartTodayBtn").addEventListener("click", () => {
  state.cards.forEach(c => c.due = 0);
  state.currentId = null;
  state.revealed = false;
  saveState();
  render();
});

render();
</script>
</body>
</html>
